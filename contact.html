<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Fifty Percent Carbon</title>
  <link rel="stylesheet" href="assets/css/style.css"> <!-- main site CSS -->
  <style>
    /* Contact page tweaks to match site colors */
    .contact-container {
      display: flex;
      justify-content: center;
      padding: 4rem 1rem;
      min-height: 80vh;
      background: var(--bg);
    }
    .contact-form {
      background-color: var(--panel);
      padding: 2.5rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
    }
    .contact-form h2 {
      color: var(--brand-2);
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }
    .contact-form input, 
    .contact-form textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(148,163,184,.12);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      box-sizing: border-box;
    }
    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: var(--muted);
    }
    .contact-form input:focus,
    .contact-form textarea:focus {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
      border-color: var(--brand-2);
    }
    .contact-form textarea {
      min-height: 120px;
      resize: vertical;
    }
    .contact-form button {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: var(--bg);
      font-weight: 800;
      font-size: 1rem;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    .contact-form button:hover {
      transform: translateY(-1px);
    }
    /* Responsive adjustments */
    @media (max-width: 500px) {
      .contact-form input, .contact-form textarea {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <!-- Header / Navigation -->
  <header class="header container">
    <a href="index.html" class="brand">
      <img src="assets/images/icon.png" alt="Fifty Percent Carbon">
      <span class="brand-name">Fifty Percent Carbon</span>
    </a>
    <nav class="navlinks">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="privacy.html">Privacy</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <!-- Contact Form -->
  <div class="contact-container container">
    <form class="contact-form" action="https://formspree.io/f/xpwjkzne" method="POST">
      <h2>Contact Us</h2>
      <input type="text" name="first_name" placeholder="First Name" required>
      <input type="text" name="last_name" placeholder="Last Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit">Send</button>
    </form>
  </div>

  <!-- Footer -->
  <footer class="footer container">
    <p>&copy; 2025 Fifty Percent Carbon. All rights reserved.</p>
  </footer>
</body>
</html>
