<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Fifty Percent Carbon</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <!-- Header / Navigation -->
  <header class="header container">
    <a href="index.html" class="brand">
      <img src="assets/images/icon.png" alt="Fifty Percent Carbon">
      <span class="brand-name">Fifty Percent Carbon</span>
    </a>
    <nav class="navlinks">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="privacy.html">Privacy</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <!-- Contact Form Section -->
  <main style="padding-top:4rem; padding-bottom:4rem;">
    <form class="contact-form" action="https://formspree.io/f/xpwjkzne" method="POST">
      <h2>Contact Us</h2>
      <div class="name-fields">
        <input type="text" name="first_name" placeholder="First Name" required>
        <input type="text" name="last_name" placeholder="Last Name" required>
      </div>
      <input type="email" name="email" placeholder="Email Address" required>
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit" class="btn">Send</button>
    </form>
  </main>

  <!-- Footer -->
  <footer class="footer container">
    <p>&copy; 2025 Fifty Percent Carbon. All rights reserved.</p>
  </footer>
</body>
</html>
