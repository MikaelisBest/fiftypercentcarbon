<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Fifty Percent Carbon</title>
  <link rel="stylesheet" href="assets/css/style.css"> <!-- if you have a main CSS -->
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f9fafb; /* match your site background */
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .contact-form {
      background-color: #ffffff;
      padding: 2.5rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 500px;
    }
    .contact-form h2 {
      color: #059669; /* your theme green */
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 600;
    }
    .contact-form input, 
    .contact-form textarea {
      width: 100%;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
      border-radius: 0.75rem;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      font-family: inherit;
    }
    .contact-form input:focus,
    .contact-form textarea:focus {
      outline: none;
      border-color: #059669;
      box-shadow: 0 0 0 2px rgba(5,150,105,0.2);
    }
    .contact-form button {
      width: 100%;
      padding: 0.85rem;
      background-color: #059669;
      color: #fff;
      font-size: 1rem;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.3s;
    }
    .contact-form button:hover {
      background-color: #047a50;
    }
  </style>
</head>
<body>
  <form class="contact-form" action="https://formspree.io/f/xpwjkzne" method="POST">
    <h2>Contact Us</h2>
    <input type="text" name="first_name" placeholder="First Name" required>
    <input type="text" name="last_name" placeholder="Last Name" required>
    <input type="email" name="email" placeholder="Email Address" required>
    <textarea name="message" placeholder="Your Message" required></textarea>
    <button type="submit">Send</button>
  </form>
</body>
</html>
